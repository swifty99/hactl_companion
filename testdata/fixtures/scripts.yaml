welcome_home:
  alias: Welcome Home
  sequence:
    - service: light.turn_on
      target:
        entity_id: light.living_room
    - service: media_player.play_media
      target:
        entity_id: media_player.speaker
      data:
        media_content_id: welcome_tune
        media_content_type: music

kino_start:
  alias: Kino Start
  mode: single
  fields:
    brightness:
      description: "Target brightness"
      required: false
      selector:
        number:
          min: 0
          max: 255
  sequence:
    - service: light.turn_on
      target:
        entity_id: light.wohnzimmer
      data:
        brightness: "{{ brightness }}"

goodnight:
  alias: Goodnight
  mode: single
  sequence:
    - service: light.turn_off
      target:
        entity_id: all
