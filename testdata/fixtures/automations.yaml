- id: automation.door_light
  alias: Door Light
  trigger:
    - platform: state
      entity_id: binary_sensor.front_door
      to: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.hallway

- id: automation.morning_coffee
  alias: Morning Coffee
  trigger:
    - platform: time
      at: "07:00:00"
  action:
    - service: switch.turn_on
      target:
        entity_id: switch.coffee_maker

- id: automation.sunset_lights
  alias: Turn on lights at sunset
  mode: single
  description: Automatically turn on exterior lights at sunset
  trigger:
    - platform: sun
      event: sunset
  action:
    - service: light.turn_on
      target:
        entity_id: light.exterior
