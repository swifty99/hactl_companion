version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: ["minor", "patch"]
      production-dependencies:
        dependency-type: production
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
