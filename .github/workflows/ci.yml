name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest tests/ --ignore=tests/integration -v --tb=short

  openapi:
    name: OpenAPI Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Validate spec matches code
        run: |
          uv run python -c "from companion.openapi import write_spec; write_spec('/tmp/generated.yaml')"
          diff -u openapi/companion-v1.yaml /tmp/generated.yaml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t hactl-companion:test .

  test-wireguard:
    name: WireGuard Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --extra integration
      - name: Run WireGuard integration tests
        run: make test-wg
