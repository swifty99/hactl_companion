name: Monthly Release

on:
  schedule:
    # 10th of each month at noon UTC — a few days after HA's first-Wednesday release
    - cron: "0 12 10 * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 2026.6). Leave empty for auto YYYY.M"
        required: false

permissions:
  contents: write

jobs:
  release:
    name: Create monthly release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
          else
            VER="$(date -u +'%Y.%-m')"
          fi
          TAG="v${VER}.0"
          echo "ver=${VER}.0" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${VER}" >> "$GITHUB_OUTPUT"

      - name: Check if already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in pyproject.toml
        if: steps.check.outputs.exists == 'false'
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.ver }}\"/" pyproject.toml

      - name: Bump version in OpenAPI spec
        if: steps.check.outputs.exists == 'false'
        run: |
          sed -i "s/^  version: .*/  version: ${{ steps.version.outputs.ver }}/" openapi/companion-v1.yaml

      - name: Commit version bump
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml openapi/companion-v1.yaml
          git commit -m "release: ${{ steps.version.outputs.title }}"
          git push

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.version.outputs.title }}" \
            --generate-notes \
            --target main
